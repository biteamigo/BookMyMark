# Search folder/bookmark/tag from root and from parent folder
# Self-contained: creates subfolder, bookmarks, and tag then runs all searches
appId: com.biteamigo.BookMyMark
---
- launchApp
# Create data: subfolder in YouTube, bookmark in it, bookmark with tag in Music
- tapOn:
    text: "YouTube"
- tapOn:
    text: "New Folder"
- tapOn:
    text: "New Bookmark"
- tapOn:
    id: "name-input"
- inputText: "SearchSub"
- tapOn:
    id: "url-input"
- inputText: "https://searchsub.example.com"
- tapOn:
    text: "Save"
- tapOn:
    id: "new-folder-button"
- tapOn:
    text: "New Bookmark"
- tapOn:
    id: "name-input"
- inputText: "SearchBook"
- tapOn:
    id: "url-input"
- inputText: "https://searchbook.example.com"
- tapOn:
    text: "Save"
- back
- tapOn:
    text: "Music"
- tapOn:
    text: "New Bookmark"
- tapOn:
    id: "name-input"
- inputText: "TagBook"
- tapOn:
    id: "url-input"
- inputText: "https://tagbook.example.com"
- tapOn:
    text: "Add tags..."
- inputText: "searchtag"
- tapOn:
    id: "add-tag-button"
- tapOn:
    text: "Save"
- back
# From root: search folder by name (seed)
- tapOn:
    text: "Search"
- inputText: "You"
- assertVisible:
    text: "YouTube"
- tapOn:
    text: "Search"
- longPressOn:
    id: "search-input"
- runFlow:
    when:
      visible: "Select All"
    commands:
      - tapOn: "Select All"
- eraseText
- inputText: "Music"
- assertVisible:
    text: "Music"
# From root: search bookmark by name
- tapOn:
    text: "Search"
- longPressOn:
    id: "search-input"
- runFlow:
    when:
      visible: "Select All"
    commands:
      - tapOn: "Select All"
- eraseText
- inputText: "SearchBook"
- assertVisible:
    text: "SearchBook"
# From root: search bookmark by tag
- tapOn:
    text: "Search"
- longPressOn:
    id: "search-input"
- runFlow:
    when:
      visible: "Select All"
    commands:
      - tapOn: "Select All"
- eraseText
- inputText: "searchtag"
- assertVisible:
    text: "TagBook"

# From parent (YouTube): search subfolder by name (the subfolder we created is "New Folder")
- tapOn:
    text: "Search"
- longPressOn:
    id: "search-input"
- runFlow:
    when:
      visible: "Select All"
    commands:
      - tapOn: "Select All"
- eraseText
- tapOn:
    text: "YouTube"
- tapOn:
    text: "Search"
- longPressOn:
    id: "search-input"
- runFlow:
    when:
      visible: "Select All"
    commands:
      - tapOn: "Select All"
- eraseText
- inputText: "New Folder"
- assertVisible:
    text: "New Folder"
# From parent: search bookmark by name
- tapOn:
    text: "Search"
- longPressOn:
    id: "search-input"
- runFlow:
    when:
      visible: "Select All"
    commands:
      - tapOn: "Select All"
- eraseText
- inputText: "SearchBook"
- assertVisible:
    text: "SearchBook"
# From parent: search bookmark by tag
- tapOn:
    text: "Search"
- longPressOn:
    id: "search-input"
- runFlow:
    when:
      visible: "Select All"
    commands:
      - tapOn: "Select All"
- eraseText
- inputText: "searchtag"
- assertVisible:
    text: "TagBook"
