# Duplicate URL: alert when creating or editing a bookmark with an existing URL
# Self-contained: creates one bookmark then tries same URL on create and on edit
appId: com.biteamigo.BookMyMark
---
- launchApp
# Create first bookmark with URL (YouTube is pre-selected when opened from folder)
- tapOn:
    text: "YouTube"
- tapOn:
    text: "New Bookmark"
- tapOn:
    id: "name-input"
- inputText: "First Bookmark"
- tapOn:
    id: "url-input"
- inputText: "https://dup-url.example.com"
- tapOn:
    text: "Save"
- assertVisible:
    text: "First Bookmark"
# Try to create second bookmark with same URL
- tapOn:
    text: "New Bookmark"
- tapOn:
    id: "name-input"
- inputText: "Second Bookmark"
- tapOn:
    id: "url-input"
- inputText: "https://dup-url.example.com"
# YouTube is pre-selected (we're in YouTube); no need to open folder picker
- tapOn:
    text: "Save"
- assertVisible:
    text: "Duplicate URL"
- tapOn:
    text: "Cancel"
# Edit another bookmark to use the same URL (back triggers Discard Changes? when form has unsaved data)
- back
- tapOn:
    text: "Discard"
- tapOn:
    text: "New Bookmark"
- tapOn:
    id: "name-input"
- inputText: "Edit To Dup"
- tapOn:
    id: "url-input"
- inputText: "https://other.example.com"
- tapOn:
    text: "Save"
- tapOn:
    text: "Select"
- tapOn:
    text: "Edit To Dup"
- tapOn:
    text: "Edit"
- tapOn:
    id: "url-input"
# Long press on the field to bring up the context menu
- longPressOn:
    id: "url-input"
# Tap 'Select All' in the context menu if it appears
- runFlow:
    when:
      visible: "Select All"
    commands:
      - tapOn: "Select All"
# Use eraseText to clear the now-selected text
- eraseText 
- inputText: "https://dup-url.example.com"
- tapOn:
    text: "Save"
- assertVisible:
    text: "Duplicate URL"
- tapOn:
    text: "Cancel"
