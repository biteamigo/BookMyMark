# Delete folder: assert Confirm Delete dialog shows cascade warning text
# Self-contained: creates a folder with content then deletes it
appId: com.biteamigo.BookMyMark
---
- launchApp
# Create folder at root with content (child folder or bookmark)
- tapOn:
    id: "new-folder-button"
- tapOn:
    text: "Select"
- tapOn:
    text: "Selected (0)"
- tapOn:
    text: "New Bookmark"
- tapOn:
    id: "folder-picker-button"
- tapOn:
    id: "folder-picker-item-New-Folder"
- tapOn:
    text: "Done"
- tapOn:
    id: "name-input"
- inputText: "Inside Cascade"
- tapOn:
    id: "url-input"
- inputText: "https://cascade.example.com"
- tapOn:
    text: "Save"
# Now at root; select the parent folder and tap Delete
- tapOn:
    text: "Select"
- tapOn:
    id: "folder-item-New-Folder"
- tapOn:
    text: "Delete"
- assertVisible:
    text: "Confirm Delete"
# Cascade warning may be in same element as title or separate; match with regex
- assertVisible:
    text: ".*delete any content in the selected folder\\(s\\)\\..*"
- tapOn:
    text: "Cancel"
