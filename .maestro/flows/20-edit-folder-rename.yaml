# Rename folder via Edit; confirm saved
appId: com.biteamigo.BookMyMark
---
- launchApp
- tapOn:
    id: "new-folder-button"
- tapOn:
    text: "Select"
- tapOn:
    id: "folder-item-New-Folder"
- tapOn:
    text: "Edit"
# Inline edit: folder name becomes editable; type new name and submit (blur)
- tapOn:
    id: "folder-name-edit-input"
- inputText: "Renamed Folder E2E"
- tapOn:
    text: "Select"
- assertVisible:
    text: "Renamed Folder E2E"
